        </h1>

        </label>
      </div>

    <div class="relative md:z-10">
      <div class="absolute left-1/2 top-150 -translate-x-1/2 -translate-y-1/2 flex max-md:flex-col -z-10 max-md:hidden">
        <div
          class="max-1xl:w-[335px] max-1xl:h-[335px] 1xl:w-[442px] 1xl:h-[442px] rounded-full bg-primary-200/20 blur-[145px]"
        ></div>
        <div
          class="max-1xl:w-[335px] max-1xl:h-[335px] 1xl:w-[442px] 1xl:h-[442px] rounded-full bg-primary-200/25 -ml-[170px] max-md:ml-0 blur-[145px]"
        ></div>
        <div
          class="max-1xl:w-[335px] max-1xl:h-[335px] 1xl:w-[442px] 1xl:h-[442px] rounded-full bg-primary-200/20 -ml-[170px] max-md:ml-0 blur-[145px]"
        ></div>
      </div>
      <div
        class="absolute left-1/2 p-[350px] top-25 -translate-x-1/2 -translate-y-1/2 bg-[url('../images/price-gradient.png')] bg-no-repeat bg-center bg-contain opacity-70 md:hidden"
      ></div>
      
      <!-- Pricing Plans Container -->
      <div id="pricing-plans-container" class="grid grid-cols-1 md:grid-cols-2 gap-8 relative max-md:z-10 mb-4 md:mb-10">
        <!-- Plans will be dynamically inserted here -->
      </div>

    </div>
  </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const plansContainer = document.getElementById('pricing-plans-container');
    const priceToggle = document.getElementById('priceCheck');
    let isYearly = true; // Default to yearly (checked state)

    // EU Pricing plans with Euro conversion (approximate 1 INR = 0.011 EUR)
    const plans = [
        {
            name: "Free",
            basePrice: 0,
            bestFor: "Freelancers, SHGs, Local sellers",
            features: [
                "✅ Unlimited Invoices & Quotations",
                "✅ UPI QR Sharing",
                "✅ Email/WhatsApp Send (with GrowInvoice branding)",
                "✅ Basic Templates",
                "✅ GSTIN Support",
                "✅ Basic Expense Tracking",
                "❌ AI Upload (PDF/Image to Invoice)",
                "❌ Payment Link / Gateway Integration",
                "❌ Tally Export",
                "❌ Custom Branding"
            ]
        },
        {
            name: "Pro",
            basePrice: 11, // ~₹999 converted to EUR
            bestFor: "MSMEs, Coaching Classes",
            features: [
                "✅ Everything in Free",
                "✅ AI PDF/Image → Invoice Generator",
                "✅ Custom Branding (logo, footer)",
                "✅ 'Pay Now' Button (UPI, Stripe, Razorpay, PayPal)",
                "✅ Tally Export",
                "✅ GST Summary Reports"
            ],
            recommended: true
        },
        {
            name: "Plus",
            basePrice: 22, // ~₹1999 converted to EUR
            bestFor: "D2C Sellers, Traders, Coaches",
            features: [
                "✅ Everything in Pro",
                "✅ WhatsApp Chat → Invoice AI",
                "✅ AI Product Detection from Chats",
                "✅ Stock & Expense Ledger",
                "✅ Payment Tracking & Reminders",
                "✅ Multilingual Invoices (Hindi, Bengali)"
            ]
        },
        {
            name: "Business",
            basePrice: 33, // ~₹2999 converted to EUR
            bestFor: "Retailers, Agencies, Distributors",
            features: [
                "✅ Everything in Plus",
                "✅ 3 Users",
                "✅ POS Mode (Desktop/Mobile)",
                "✅ Recurring Billing & Subscriptions",
                "✅ Bulk Excel Uploads",
                "✅ All Payment Modes: QR, Stripe, PayPal, Bank, Cash"
            ]
        },
        {
            name: "Ultimate",
            basePrice: 88, // ~₹7999 converted to EUR
            bestFor: "Global MSMEs, Agencies w/ Teams",
            features: [
                "✅ Everything in Business",
                "✅ AI-Powered Storefront Creation",
                "✅ Auto Social Media Posting",
                "✅ Multiple Price Books (EUR, USD, etc.)",
                "✅ International Payment Support",
                "✅ Priority Support",
                "✅ Team Access (up to 10 users)",
                "✅ Advanced Reports & Analytics"
            ]
        }
    ];

    // Calculate price based on billing period
    const calculatePrice = (basePrice) => {
        if (basePrice === 0) return "€0";
        if (isYearly) {
            const monthlyPrice = Math.round(basePrice / 12 * 1.25);
            return `€${monthlyPrice}/month`;
        } else {
            const monthlyPrice = Math.round(basePrice / 12 * 1.25);
            return `€${monthlyPrice}/month`;
        }
    };

    // Check/Cross icon SVGs
    const checkIcon = `
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="20" height="20" rx="10" fill="" class="fill-green-500"/>
            <path d="M9.31661 13.7561L14.7491 8.42144C15.0836 8.0959 15.0836 7.5697 14.7491 7.24416C14.4145 6.91861 13.8736 6.91861 13.539 7.24416L8.7116 11.9901L6.46096 9.78807C6.12636 9.46253 5.58554 9.46253 5.25095 9.78807C4.91635 10.1136 4.91635 10.6398 5.25095 10.9654L8.1066 13.7561C8.27347 13.9184 8.49253 14 8.7116 14C8.93067 14 9.14974 13.9184 9.31661 13.7561Z" fill="white"/>
        </svg>
    `;

    const crossIcon = `
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="20" height="20" rx="10" fill="" class="fill-red-500"/>
            <path d="M13.334 6.66675L6.66732 13.3334M6.66732 6.66675L13.334 13.3334" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    `;

    // Render pricing plans
    const renderPlans = () => {
        plansContainer.innerHTML = '';

        plans.forEach((plan, idx) => {
            // For the 5th card, add col-span-2 and center it
            const extraClass = (idx === 4) ? 'md:col-span-2 md:mx-auto md:max-w-xl' : '';
            const planCard = document.createElement('div');
            planCard.className = `bg-white dark:bg-dark-200 shadow-box rounded-medium p-2.5 w-full h-full flex flex-col ${plan.recommended ? 'border-2 border-primary' : ''} ${extraClass}`;
            
            const featuresHtml = plan.features
                .map(feature => {
                    const isIncluded = feature.startsWith('✅');
                    const featureText = feature.replace(/^[✅❌]\s*/, '');
                    const icon = isIncluded ? checkIcon : crossIcon;
                    
                    return `
                        <li class="mb-3 flex items-start gap-3">
                            ${icon}
                            <span class="text-sm ${isIncluded ? 'text-paragraph dark:text-white' : 'text-gray-400 dark:text-gray-500'}">${featureText}</span>
                        </li>
                    `;
                }).join('');

            planCard.innerHTML = `
                <div class="border border-dashed rounded border-gray-100 dark:border-borderColour-dark p-6 h-full flex flex-col ${plan.recommended ? 'lg:pt-3' : ''}">
                    
                    ${plan.recommended 
                        ? `<div class="flex justify-center mb-4"><span class="bg-primary text-white py-1.5 px-4 rounded-full font-medium text-sm">Recommended</span></div>`
                        : `<div class="h-[42px]"></div>` /* Placeholder for alignment */
                    }
                    
                    <div class="text-center mb-6">
                        <h3 class="text-2xl font-bold text-paragraph dark:text-white mb-2">${plan.name}</h3>
                        <div class="mb-4">
                            <span class="text-4xl font-bold text-primary">${calculatePrice(plan.basePrice)}</span>
                        </div>
                        <p class="text-paragraph-light dark:text-gray-300 text-sm">${plan.bestFor}</p>
                    </div>
                    
                    <ul class="flex-1 mb-6">
                        ${featuresHtml}
                    </ul>
                    
                    <div class="mt-auto">
                      <a href="https://go.growinvoice.com/login" target="_blank" class="w-full ${plan.recommended ? 'bg-primary text-white hover:bg-primary/90' : 'bg-gray-100 dark:bg-gray-700 text-paragraph dark:text-white hover:bg-gray-200 dark:hover:bg-gray-600'} py-3 px-6 rounded-lg font-medium transition-colors">
                        <button class="w-full ${plan.recommended ? 'bg-primary text-white hover:bg-primary/90' : 'bg-gray-100 dark:bg-gray-700 text-paragraph dark:text-white hover:bg-gray-200 dark:hover:bg-gray-600'} py-3 px-6 rounded-lg font-medium transition-colors">
                            ${plan.basePrice === 0 ? 'Get Started Free' : 'Choose Plan'}
                        </button>
                      </a>
                        
                    </div>
                </div>
            `;

            plansContainer.appendChild(planCard);
        });
    };

    // Toggle event listener
    priceToggle.addEventListener('change', (e) => {
        isYearly = e.target.checked;
        renderPlans();
    });

    // Initial render
    renderPlans();
});
</script>
