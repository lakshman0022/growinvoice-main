<section class="bg-white dark:bg-dark-300 max-lg:pt-150 pt-[240px] pb-[150px] max-md:mb-25 relative overflow-hidden">
  <div class="container mx-auto px-4">
    <div
      class="mb-12 text-center max-w-[948px] mx-auto relative z-10"
      data-aos="fade-up"
      data-aos-offset="200"
      data-aos-duration="1000"
      data-aos-once="true"
    >
      <div class="">
        <p class="mb-4 font-medium uppercase">OUR PRICING</p>
        <h1 class="max-lg:mb-10 mb-10">
          Choose the right plan for <br />
          your business
        </h1>
      </div>

      <div class="pricing mt-4 hidden">
        <label class="relative inline-flex items-center cursor-pointer z-[110]">
          <span class="mr-2.5 text-base font-semibold text-paragraph dark:text-white py-5">Monthly</span>
          <input
            type="checkbox"
            id="priceCheck"
            class="sr-only peer"
          />
          <div
            class=" relative w-15 h-[34px] bg-paragraph rounded-[20px] peer-checked:after:translate-x-full  after:content-[''] after:absolute after:top-1/2 after:-translate-y-1/2 after:start-[5px] peer-checked:after:start-[7px] after:bg-primary  after:rounded-full after:h-6 after:w-6 after:transition-all before:absolute before:content-[''] before:border before:border-dashed before:w-[calc(100%-10px)] before:h-[calc(100%-10px)] before:rounded-[20px] before:top-1/2 before:-translate-y-1/2 before:left-1/2 before:-translate-x-1/2 before:border-white/40 "
          ></div>
          <span class="ms-2.5 text-base font-semibold text-paragraph dark:text-white py-5">Yearly</span>
        </label>
      </div>
    </div>

    <div class="relative md:z-10">
      <div class="absolute left-1/2 top-150 -translate-x-1/2 -translate-y-1/2 flex max-md:flex-col -z-10 max-md:hidden">
        <div
          class="max-1xl:w-[335px] max-1xl:h-[335px]  1xl:w-[442px] 1xl:h-[442px]  rounded-full bg-primary-200/20 blur-[145px]"
        ></div>
        <div
          class="max-1xl:w-[335px] max-1xl:h-[335px]  1xl:w-[442px] 1xl:h-[442px]  rounded-full bg-primary-200/25 -ml-[170px] max-md:ml-0 blur-[145px]"
        ></div>
        <div
          class="max-1xl:w-[335px] max-1xl:h-[335px]  1xl:w-[442px] 1xl:h-[442px]  rounded-full bg-primary-200/20 -ml-[170px] max-md:ml-0 blur-[145px]"
        ></div>
      </div>
      <div
        class="absolute left-1/2 p-[350px] top-25 -translate-x-1/2 -translate-y-1/2 bg-[url('../images/price-gradient.png')] bg-no-repeat bg-center bg-contain opacity-70 md:hidden"
      ></div>
      
      <!-- This is the container where dynamic plans will be injected -->
      <div id="pricing-plans-container" class="flex max-lg:flex-col items-center gap-8 relative max-md:z-10 mb-10">
        <!-- Static content as a fallback and placeholder -->
        <div class="text-center p-10">Loading pricing plans...</div>
      </div>

    </div>
  </div>
</section>
<script>
document.addEventListener('DOMContentLoaded', () => {
    
    const plansContainer = document.getElementById('pricing-plans-container');
    const apiUrl = 'https://api-dev.growinvoice.com/api/plans';

    // SVG icon template to be reused in each feature list item
    const checkIconSvg = `
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="20" height="20" rx="10" fill="" class="fill-primary"/>
            <path d="M9.31661 13.7561L14.7491 8.42144C15.0836 8.0959 15.0836 7.5697 14.7491 7.24416C14.4145 6.91861 13.8736 6.91861 13.539 7.24416L8.7116 11.9901L6.46096 9.78807C6.12636 9.46253 5.58554 9.46253 5.25095 9.78807C4.91635 10.1136 4.91635 10.6398 5.25095 10.9654L8.1066 13.7561C8.27347 13.9184 8.49253 14 8.7116 14C8.93067 14 9.14974 13.9184 9.31661 13.7561Z" fill="" class="fill-paragraph"/>
        </svg>
    `;

    const fetchAndRenderPlans = async () => {
        try {
            const response = await fetch(apiUrl);
            if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
            }
            const plans = await response.json();

            if (!plans || plans.length === 0) {
                plansContainer.innerHTML = '<p class="text-center w-full col-span-full">No pricing plans available at the moment.</p>';
                return;
            }

            // Clear the loading message
            plansContainer.innerHTML = ''; 

            plans.forEach((plan, index) => {
                const yearlyPrice = (plan.price * 12).toFixed(2);

                // We will highlight the first plan (index 0) as "Recommended"
                const isRecommended = index === 0;

                const featuresHtml = plan.PlanFeatures
                    .map(feature => `
                        <li class="mb-6 flex items-center gap-3.5">
                            ${checkIconSvg}
                            <span>${feature.count > 1 ? `${feature.count} ${feature.feature}s` : feature.feature}</span>
                        </li>
                    `).join('');

                const planCard = document.createElement('div');
                planCard.className = "bg-white dark:bg-dark-200 shadow-box rounded-medium p-2.5 md:w-[calc(50%-1rem)] lg:w-[calc(33.3333%-1rem)] w-full flex flex-col justify-between";
                planCard.innerHTML = `
                    <div class="border border-dashed rounded border-gray-100 dark:border-borderColour-dark p-8 max-md:p-5 ${isRecommended ? 'lg:pt-3 lg:pb-15' : ''}">
                        
                        ${isRecommended 
                            ? `<div class="flex justify-end mb-2.5"><span class="-mr-4 bg-primary text-paragraph py-1.5 px-3 rounded-full font-medium">Recommended</span></div>`
                            : `<div class="h-[46px]"></div>` /* Placeholder for alignment */
                        }
                        
                        <h3 class="mb-2">${plan.name}</h3>
                        
                        <div class="price-month mb-16">
                            <h2>₹<span>${plan.price.toFixed(2)}</span></h2>
                            <p>Per Month</p>
                        </div>
                        <div class="price-year mb-16" style="display: none;">
                            <h2>$<span>${yearlyPrice}</span></h2>
                            <p>Per Year</p>
                        </div>

                        <ul class="relative after:absolute after:-top-12 after:h-0.5 after:w-full after:bg-[url('../images/banking/border.svg')] dark:after:bg-[url('../images/banking/border-dark.svg')] after:bg-center after:bg-no-repeat after:bg-full mt-auto">
                            ${featuresHtml}
                        </ul>
                        
                        <a href="https://go.growinvoice.com/login" target="_blank" class="${isRecommended ? 'btn' : 'btn-outline dark:bg-transparent'} text-center py-3 w-full mt-8">
                            Get Started Now
                        </a>
                    </div>
                `;
                plansContainer.appendChild(planCard);
            });

        } catch (error) {
            console.error("Failed to fetch pricing plans:", error);
            plansContainer.innerHTML = `<p class="text-center w-full col-span-full text-red-500">Could not load pricing plans. Please try again later.</p>`;
        }
    };

    fetchAndRenderPlans();
});
</script>
